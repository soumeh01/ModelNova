name: Run RPS on AppKit-E8 Hardware
on:
  workflow_dispatch:
  workflow_call:
permissions:
  contents: read
  actions: read

jobs:
  fork-check:
    if: ${{ github.repository != 'soumeh01/ModelNova' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Notify runner restriction
        run: |
          MESSAGE="Workflows on the private runner are restricted for security reasons."
          echo "${MESSAGE}"
          {
            echo "## ⚠️ AppKit-E8 hardware test was not run"
            echo ""
            echo "${MESSAGE}"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

  CI:
    if: >-
      ${{ ((github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' ) && github.repository == 'soumeh01/ModelNova') }}
    runs-on: [ubuntu-latest]

    steps:
      - name: Print GitHub event name
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "Full_name=${{github.repository}}"

      - name: Run run run
        run: |
          echo "The workflow CI job is running"
          echo "Test contribution"
