name: Build RPS for AppKit-E8 Hardware
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Activate vcpkg
        uses: ARM-software/cmsis-actions/vcpkg@v1
        with:
          config: "./vcpkg-configuration.json"
          cache: "ModelNova"

      - name: Activate Arm tool license
        uses: ARM-software/cmsis-actions/armlm@v1

      - name: Initialize CMSIS pack root folder
        run: |
          cpackget init https://www.keil.com/pack/index.pidx
          cpackget update-index

      - name: Cache downloaded packs
        uses: actions/cache@v5
        with:
          key: ModelNova
          path: /home/runner/.cache/arm/packs/.Download

      - name: Add Beta packs
        working-directory: ./
        run: |
          cpackget add ./packs/PyTorch.ExecuTorch.1.1.0-rc1-build.12/PyTorch.ExecuTorch.pdsc --agree-embedded-license
          cpackget add ./packs/AlifSemiconductor.Ensemble.2.2.0-dev8+g560eb47.pack --agree-embedded-license

      - name: Build the target-set
        working-directory: ./RockPaperScissors/AppKit-E8_USB
        run: |
          cbuild SDS.csolution.yml --active AppKit-E8-U85@HIL --packs

      - name: Upload output of the built target-set
        uses: actions/upload-artifact@v7
        with:
          name: RPS_AppKit-E8-U85_HIL
          path: |
            ./RockPaperScissors/AppKit-E8_USB/out

  RUN-HARDWARE-TEST:
    needs: [ CI ]
    uses: ./.github/workflows/Run_RPS_AppKit-E8.yml
    secrets: inherit
